let lang = 'ko';
let activeCat = 0;

function setLang(l) {
  lang = l;
  document.querySelectorAll('.lang-btn').forEach((b,i) => {
    b.classList.toggle('active', ['ko','zh','en'][i] === l);
  });
  render();
}

function render() {
  const t = T[lang];
  document.getElementById('h-name').textContent = t.name;
  document.getElementById('h-sub').textContent = t.sub;
  document.getElementById('info-bar').textContent = '📍 ' + t.location;
  const catsEl = document.getElementById('cats');
  catsEl.innerHTML = '';
  t.cats.forEach((c,i) => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (activeCat === i ? ' active' : '');
    btn.textContent = c;
    btn.onclick = () => { activeCat = i; render(); };
    catsEl.appendChild(btn);
  });
  const filtered = activeCat === 0 ? products : products.filter(p => p.cat.includes(activeCat));
  const prod = document.getElementById('products');
  prod.innerHTML = '';
  filtered.forEach(p => {
    const d = p[lang];
    const card = document.createElement('div');
    card.className = 'product-card';
    card.innerHTML = `<div class="product-img">${p.emoji}</div>
      <div class="product-info">
        <div class="product-cat">${d.cat}</div>
        <div class="product-name">${d.name}</div>
        <div class="product-mfr">${d.mfr}</div>
      </div>`;
    card.onclick = () => openModal(p);
    prod.appendChild(card);
  });
}

function openModal(p) {
  const d = p[lang];
  const t = T[lang];
  document.getElementById('m-img').textContent = p.emoji;
  document.getElementById('m-cat').textContent = d.cat;
  document.getElementById('m-name').textContent = d.name;
  document.getElementById('m-mfr').textContent = d.mfr;
  document.getElementById('m-label-ing').textContent = t.labelIng;
  document.getElementById('m-ing').textContent = d.ing;
  document.getElementById('m-label-desc').textContent = t.labelDesc;
  document.getElementById('m-desc').textContent = d.desc;
  document.getElementById('m-label-use').textContent = t.labelUse;
  document.getElementById('m-use').textContent = d.use;
  document.getElementById('modal-bg').classList.add('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('modal-bg')) {
    document.getElementById('modal-bg').classList.remove('open');
  }
}
function closeModalBtn() {
  document.getElementById('modal-bg').classList.remove('open');
}

render();
</script>
