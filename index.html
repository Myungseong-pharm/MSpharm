<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>명성약국 | Myung_Seong Pharmacy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .product-card {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .product-card:active {
            transform: scale(0.96);
        }

        .modal-animate {
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .category-btn.active {
            background-color: #10b981;
            color: white;
            box-shadow: 0 4px 6px -1px rgba(16, 185, 129, 0.2);
        }

        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* 스캔 애니메이션 */
        @keyframes scan {
            0% { top: 0%; }
            100% { top: 100%; }
        }
        .scan-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: linear-gradient(to right, transparent, #10b981, transparent);
            box-shadow: 0 0 8px #10b981;
            animation: scan 2s linear infinite;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-900">

<div id="app" class="max-w-md mx-auto bg-white min-h-screen shadow-2xl relative border-x border-gray-200">
    <!-- Header -->
    <header class="sticky top-0 z-30 bg-white/95 backdrop-blur-md border-b border-gray-200 px-4 py-3">
        <div class="flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div>
                    <h1 id="h-name" class="text-lg font-bold text-emerald-600 leading-tight">명성약국</h1>
                    <p id="h-sub" class="text-[10px] text-gray-400 font-medium tracking-tighter">Myung_Seong Pharmacy</p>
                </div>
                <!-- 카메라 검색 버튼 -->
                <button onclick="triggerCamera()" class="w-10 h-10 rounded-full bg-emerald-50 text-emerald-600 flex items-center justify-center active:scale-95 transition-transform border border-emerald-100">
                    <i class="fa-solid fa-camera text-lg"></i>
                </button>
                <input type="file" id="camera-input" accept="image/*" capture="environment" class="hidden" onchange="handleImageSearch(event)">
            </div>
            
            <div class="flex gap-1">
                <button onclick="setLang('zh')" class="lang-btn px-2 py-1 text-[10px] rounded-md border border-gray-200 transition-colors" data-lang="zh">CN</button>
                <button onclick="setLang('en')" class="lang-btn px-2 py-1 text-[10px] rounded-md border border-gray-200 transition-colors" data-lang="en">EN</button>
                <button onclick="setLang('ko')" class="lang-btn px-2 py-1 text-[10px] rounded-md border border-gray-200 transition-colors" data-lang="ko">KR</button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <div class="flex">
        <!-- Categories (Sidebar) -->
        <aside class="w-24 sticky top-[57px] h-[calc(100vh-57px)] bg-gray-50 border-r border-gray-200 overflow-y-auto hide-scrollbar py-2 flex flex-col gap-1 items-center">
            <div id="cats-container" class="w-full flex flex-col gap-1 px-1.5"></div>
        </aside>

        <!-- Product Grid -->
        <main class="flex-1 p-3">
            <div id="loading-state" class="py-20 text-center">
                <i class="fa-solid fa-circle-notch fa-spin text-emerald-500 text-3xl mb-3"></i>
                <p class="text-gray-400 text-sm mt-3">데이터를 불러오는 중...</p>
            </div>
            
            <div id="products-container" class="grid grid-cols-2 gap-3 hidden"></div>
            
            <div id="empty-state" class="hidden py-20 text-center">
                <i class="fa-solid fa-box-open text-gray-200 text-4xl mb-3"></i>
                <p class="text-gray-400 text-sm">제품이 없습니다.</p>
            </div>
        </main>
    </div>

    <!-- AI 분석 로딩 오버레이 -->
    <div id="ai-loading" class="fixed inset-0 bg-black/60 z-[60] hidden flex flex-col items-center justify-center p-6 text-center">
        <div class="relative w-48 h-48 bg-white/10 rounded-2xl border border-white/20 overflow-hidden mb-6">
            <div class="scan-line"></div>
            <i class="fa-solid fa-magnifying-glass text-white/20 text-6xl absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2"></i>
            <img id="preview-img" class="w-full h-full object-cover opacity-80 hidden">
        </div>
        <h3 id="ai-status-text" class="text-white font-bold text-lg mb-2">제품 분석 중...</h3>
        <p class="text-white/60 text-sm">약 상자의 텍스트를 읽고 있습니다.</p>
    </div>

    <!-- Modal Backdrop -->
    <div id="modal-backdrop" onclick="closeModal(event)" class="fixed inset-0 bg-black/40 z-40 hidden backdrop-blur-sm transition-opacity duration-300 opacity-0"></div>

    <!-- Detail Modal -->
    <div id="detail-modal" class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white z-50 rounded-t-[24px] shadow-2xl modal-animate translate-y-full max-h-[90vh] overflow-y-auto">
        <div class="sticky top-0 bg-white px-4 pt-4 pb-2 border-b border-gray-50 z-10">
            <div class="w-12 h-1.5 bg-gray-200 rounded-full mx-auto mb-4" onclick="closeModalBtn()"></div>
            <button onclick="closeModalBtn()" class="absolute right-4 top-4 w-8 h-8 flex items-center justify-center bg-gray-100 rounded-full text-gray-500 active:scale-90 transition-transform">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>

        <div class="p-6">
            <div id="m-img-container" class="w-full aspect-[4/3] bg-gray-50 rounded-2xl mb-6 flex items-center justify-center overflow-hidden relative border border-gray-100"></div>
            <div class="mb-6">
                <span id="m-cat" class="inline-block px-2 py-0.5 bg-emerald-50 text-emerald-600 rounded text-[10px] font-bold mb-2 tracking-wide uppercase">카테고리</span>
                <h2 id="m-name" class="text-2xl font-bold text-gray-900 leading-tight mb-1">제품명</h2>
                <p id="m-mfr" class="text-sm text-gray-400">제조사</p>
            </div>
            <div class="space-y-6">
                <section>
                    <h3 id="m-label-ing" class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">주요 성분</h3>
                    <div id="m-ing" class="bg-emerald-50/50 border border-emerald-100/50 rounded-xl p-3 text-sm text-emerald-800 leading-relaxed font-medium"></div>
                </section>
                <section>
                    <h3 id="m-label-desc" class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">효능 및 설명</h3>
                    <p id="m-desc" class="text-gray-700 text-sm leading-relaxed whitespace-pre-line"></p>
                </section>
                <section>
                    <h3 id="m-label-use" class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">용법용량 및 주의사항</h3>
                    <div id="m-use" class="bg-amber-50 border border-amber-100 rounded-xl p-3 text-sm text-amber-800 leading-relaxed italic whitespace-pre-line"></div>
                </section>
            </div>
            <div class="h-10"></div>
        </div>
    </div>
</div>

<script>
const T = {
  ko: {
    name: '명성약국', sub: 'Myung_Seong Pharmacy',
    emptyState: '제품이 없습니다.',
    aiError: '제품을 인식하지 못했습니다. 다시 시도해주세요.',
    aiFound: '제품을 찾았습니다!',
    cats: ['전체', '피부케어', '약국 영양제', '건강기능식품', '해열·진통·소염', '감기·기침·목', '알러지·코감기', '소화·위장', '눈·코 외용', '피부·구강 외용', '파스류', '어린이 해열·감기', '어린이영양제', '근육이완제', '벌레·모기', '드링크', '기타'],
    labelIng: '주요 성분', labelDesc: '효능 및 설명', labelUse: '용법용량 및 주의사항'
  },
  zh: {
    name: '明星药局', sub: 'Myung_Seong Pharmacy',
    emptyState: '没有产品。',
    aiError: '无法识别产品。请再试一次。',
    aiFound: '找到了产品！',
    cats: ['全部', '皮肤护理', '药店营养剂', '健康功能食品', '退烧·镇痛·消炎', '感冒·咳嗽·喉咙', '过敏·鼻感冒', '消化·肠胃', '眼·鼻外用', '皮肤·口腔外用', '贴剂', '儿童退烧·감기', '儿童营养剂', '肌肉松弛剂', '防蚊·驱虫', '饮품', '其他'],
    labelIng: '主要成分', labelDesc: '功效与说明', labelUse: '用法用量及注意事项'
  },
  en: {
    name: 'Myung_Seong Pharmacy', sub: 'Pharmacy',
    emptyState: 'No products available.',
    aiError: 'Could not identify product. Please try again.',
    aiFound: 'Product found!',
    cats: ['All', 'Skin Care', 'Pharmacy Supplements', 'Health Functional Foods', 'Fever/Pain', 'Cold/Cough', 'Allergy/Nasal', 'Digestion', 'Eye/Nose', 'Skin/Oral', 'Patches', 'Kids Cold', 'Kids Vitamins', 'Muscle Relaxants', 'Bug/Mosquito', 'Drinks', 'Other'],
    labelIng: 'Key Ingredients', labelDesc: 'Description & Efficacy', labelUse: 'Dosage & Warnings'
  }
};

const IMAGE_BASE_URL = 'https://raw.githubusercontent.com/Myungseong-pharm/MSpharm-imeges/main/';
const apiKey = ""; // API Key는 실행 환경에서 주입됩니다.

let products = [];
let state = { lang: 'ko', activeCat: 0 };
const DOM = {};

function initDOMCache() {
    DOM.hName = document.getElementById('h-name');
    DOM.hSub = document.getElementById('h-sub');
    DOM.catsContainer = document.getElementById('cats-container');
    DOM.productsContainer = document.getElementById('products-container');
    DOM.emptyState = document.getElementById('empty-state');
    DOM.loadingState = document.getElementById('loading-state');
    DOM.aiLoading = document.getElementById('ai-loading');
    DOM.previewImg = document.getElementById('preview-img');
    DOM.aiStatusText = document.getElementById('ai-status-text');
    
    DOM.mImgContainer = document.getElementById('m-img-container');
    DOM.mCat = document.getElementById('m-cat');
    DOM.mName = document.getElementById('m-name');
    DOM.mMfr = document.getElementById('m-mfr');
    DOM.mLabelIng = document.getElementById('m-label-ing');
    DOM.mIng = document.getElementById('m-ing');
    DOM.mLabelDesc = document.getElementById('m-label-desc');
    DOM.mDesc = document.getElementById('m-desc');
    DOM.mLabelUse = document.getElementById('m-label-use');
    DOM.mUse = document.getElementById('m-use');
    DOM.backdrop = document.getElementById('modal-backdrop');
    DOM.modal = document.getElementById('detail-modal');
}

async function loadProducts() {
    try {
        const autoVersion = Math.floor(Date.now() / (1000 * 60 * 10));
        let response = await fetch(`https://raw.githubusercontent.com/Myungseong-pharm/MSpharm/main/products.json?v=${autoVersion}`);
        if (!response.ok) throw new Error('데이터 로드 실패');
        products = await response.json();
        products.forEach((p, index) => p.id = index);
        DOM.loadingState.classList.add('hidden');
        DOM.productsContainer.classList.remove('hidden');
        render(); 
    } catch (error) {
        DOM.loadingState.innerHTML = '<p class="text-red-500 text-sm mt-4">데이터 로딩 오류</p>';
    }
}

function triggerCamera() {
    document.getElementById('camera-input').click();
}

async function handleImageSearch(event) {
    const file = event.target.files[0];
    if (!file) return;

    DOM.aiLoading.classList.remove('hidden');
    DOM.aiStatusText.textContent = "이미지 분석 중...";
    
    const reader = new FileReader();
    reader.onload = (e) => {
        DOM.previewImg.src = e.target.result;
        DOM.previewImg.classList.remove('hidden');
    };
    reader.readAsDataURL(file);

    try {
        const base64Data = await fileToBase64(file);
        const matchId = await identifyProductWithAI(base64Data);
        
        if (matchId !== null) {
            DOM.aiStatusText.textContent = T[state.lang].aiFound;
            setTimeout(() => openModal(matchId), 500);
        } else {
            showMessage(T[state.lang].aiError);
        }
    } catch (error) {
        console.error("AI Search Error:", error);
        showMessage(T[state.lang].aiError);
    } finally {
        setTimeout(() => {
            DOM.aiLoading.classList.add('hidden');
            DOM.previewImg.classList.add('hidden');
        }, 1000);
        event.target.value = '';
    }
}

async function fileToBase64(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.onerror = error => reject(error);
    });
}

async function identifyProductWithAI(base64Image) {
    // 모델 성능 최적화를 위해 간결한 리스트 제공
    const simplifiedList = products.map(p => `ID:${p.id} | Name:${p.ko.name} | Mfr:${p.ko.mfr}`).join('\n');
    
    const prompt = `이 사진에서 보이는 약 제품이 무엇인지 확인해주세요.
    먼저 사진 속의 텍스트(제품명, 제조사)를 읽고, 아래 제공된 [제품 목록]에서 가장 일치하는 제품의 ID(숫자)를 하나만 말해주세요.
    만약 목록에 확실한 제품이 없다면 'null'이라고 답하세요.
    
    [제품 목록]:
    ${simplifiedList}`;

    const payload = {
        contents: [{
            parts: [
                { text: prompt },
                { inlineData: { mimeType: "image/jpeg", data: base64Image } }
            ]
        }]
    };

    let retries = 5;
    let delay = 1000;

    while (retries > 0) {
        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (!response.ok) throw new Error('API Response Error');

            const result = await response.json();
            const textResponse = result.candidates?.[0]?.content?.parts?.[0]?.text || "";
            
            // 정규표현식으로 숫자(ID) 추출
            const idMatch = textResponse.match(/\d+/);
            if (idMatch) {
                const id = parseInt(idMatch[0]);
                // 유효한 범위의 ID인지 확인
                if (products.some(p => p.id === id)) return id;
            }
            return null;
        } catch (error) {
            retries--;
            if (retries === 0) return null;
            await new Promise(r => setTimeout(r, delay));
            delay *= 2;
        }
    }
    return null;
}

function showMessage(msg) {
    const box = document.createElement('div');
    box.className = 'fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-black/80 text-white px-6 py-4 rounded-2xl z-[100] text-sm font-medium backdrop-blur-md text-center';
    box.textContent = msg;
    document.body.appendChild(box);
    setTimeout(() => {
        box.style.transition = 'opacity 0.5s';
        box.style.opacity = '0';
        setTimeout(() => box.remove(), 500);
    }, 2500);
}

function setLang(l) {
    state.lang = l;
    updateLanguageUI();
    render();
}

function updateLanguageUI() {
    const t = T[state.lang];
    DOM.hName.textContent = t.name;
    DOM.hSub.textContent = t.sub;
    
    document.querySelectorAll('.lang-btn').forEach(btn => {
        const lang = btn.getAttribute('data-lang');
        const isSelected = lang === state.lang;
        btn.classList.toggle('bg-emerald-600', isSelected);
        btn.classList.toggle('text-white', isSelected);
        btn.classList.toggle('border-emerald-600', isSelected);
    });
}

function setActiveCat(index) {
    state.activeCat = index;
    render();
    window.scrollTo(0, 0);
}

function render() {
    if (products.length === 0) return;
    const t = T[state.lang];
    const catCounts = t.cats.map((_, i) => i === 0 ? products.length : products.filter(p => p.cat.includes(i)).length);

    DOM.catsContainer.innerHTML = t.cats.map((cat, i) => `
        <button onclick="setActiveCat(${i})" class="category-btn w-full px-1 py-2.5 rounded-lg text-[11px] font-bold transition-all text-gray-700 hover:bg-gray-200 flex flex-col items-center justify-center gap-1 ${state.activeCat === i ? 'active' : ''}">
            <span class="text-center break-keep leading-tight">${cat}</span>
            <span class="text-[9px] opacity-70">(${catCounts[i]})</span>
        </button>
    `).join('');

    const filtered = products.filter(p => state.activeCat === 0 || p.cat.includes(state.activeCat));
    if (filtered.length === 0) {
        DOM.productsContainer.innerHTML = '';
        DOM.emptyState.classList.remove('hidden');
    } else {
        DOM.emptyState.classList.add('hidden');
        DOM.productsContainer.innerHTML = filtered.map(p => {
            const d = p[state.lang];
            const imgContent = p.img 
                ? `<img src="${IMAGE_BASE_URL}${p.img}" loading="lazy" class="w-full h-full object-contain p-2 mix-blend-multiply" onerror="this.onerror=null; this.parentElement.innerHTML='<div class=\\'text-3xl\\'>${p.emoji}</div>';">` 
                : `<div class="text-3xl">${p.emoji}</div>`;
            return `
                <div class="product-card bg-white rounded-xl border border-gray-200 overflow-hidden shadow-sm hover:shadow-md hover:border-emerald-300 cursor-pointer" onclick="openModal(${p.id})">
                    <div class="aspect-square bg-gray-50/50 flex items-center justify-center relative border-b border-gray-100">${imgContent}</div>
                    <div class="p-3">
                        <p class="text-[9px] font-bold text-emerald-500 uppercase tracking-tighter mb-1">${t.cats[p.cat[1]||p.cat[0]]}</p>
                        <h3 class="text-[12px] font-bold text-gray-800 leading-tight line-clamp-2 h-8 mb-1">${d.name}</h3>
                        <p class="text-[10px] text-gray-400 truncate">${d.mfr}</p>
                    </div>
                </div>`;
        }).join('');
    }
}

function openModal(id) {
    const p = products.find(prod => prod.id === id);
    if (!p) return;
    const d = p[state.lang];
    const t = T[state.lang];
    
    DOM.mImgContainer.innerHTML = p.img 
        ? `<img src="${IMAGE_BASE_URL}${p.img}" class="w-full h-full object-contain p-6 mix-blend-multiply" onerror="this.onerror=null; this.parentElement.innerHTML='<div class=\\'text-6xl\\'>${p.emoji}</div>';">` 
        : `<div class="text-6xl">${p.emoji}</div>`;

    DOM.mCat.textContent = t.cats[p.cat[1]||p.cat[0]];
    DOM.mName.textContent = d.name;
    DOM.mMfr.textContent = d.mfr;
    DOM.mLabelIng.textContent = t.labelIng;
    DOM.mIng.textContent = d.ing;
    DOM.mLabelDesc.textContent = t.labelDesc;
    DOM.mDesc.textContent = d.desc;
    DOM.mLabelUse.textContent = t.labelUse;
    DOM.mUse.textContent = d.use;

    DOM.backdrop.classList.remove('hidden');
    setTimeout(() => {
        DOM.backdrop.classList.add('opacity-100');
        DOM.modal.classList.remove('translate-y-full');
    }, 10);
}

function closeModal(e) { if (e.target.id === 'modal-backdrop') closeModalBtn(); }
function closeModalBtn() {
    DOM.backdrop.classList.remove('opacity-100');
    DOM.modal.classList.add('translate-y-full');
    setTimeout(() => DOM.backdrop.classList.add('hidden'), 300);
}

document.addEventListener('DOMContentLoaded', () => {
    initDOMCache();
    updateLanguageUI();
    loadProducts(); 
});
</script>
</body>
</html>
