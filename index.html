let state = {
    lang: 'ko',
    activeCat: 0,
    searchQuery: ''
};

// --- Core Functions ---

function setLang(l) {
    state.lang = l;
    updateLanguageUI();
    render();
}

function updateLanguageUI() {
    const t = T[state.lang];
    document.getElementById('h-name').textContent = t.name;
    document.getElementById('h-sub').textContent = t.sub;
    document.getElementById('info-bar').textContent = '📍 ' + t.location;
    document.getElementById('search-input').placeholder = t.searchPlaceholder;
    
    document.querySelectorAll('.lang-btn').forEach(btn => {
        const isSelected = btn.getAttribute('onclick').includes(state.lang);
        btn.classList.toggle('bg-emerald-600', isSelected);
        btn.classList.toggle('text-white', isSelected);
        btn.classList.toggle('border-emerald-600', isSelected);
    });
}

function handleSearch() {
    state.searchQuery = document.getElementById('search-input').value.toLowerCase();
    render();
}

function setActiveCat(index) {
    state.activeCat = index;
    render();
}

function getProductHTML(p, t) {
    const d = p[state.lang];
    const rot = p.rotate ? `style="transform:rotate(${p.rotate}deg)"` : '';
    const imgUrl = p.imgId ? `https://drive.google.com/thumbnail?id=${p.imgId}&sz=w400` : '';

    return `
        <div class="product-card bg-white rounded-2xl border border-gray-100 overflow-hidden shadow-sm hover:shadow-md cursor-pointer" onclick="openModal(${JSON.stringify(p).replace(/"/g, '&quot;')})">
            <div class="aspect-square bg-gray-50 flex items-center justify-center relative overflow-hidden">
                ${imgUrl ? `<img src="${imgUrl}" alt="${d.name}" class="w-full h-full object-cover" ${rot} loading="lazy" onerror="this.classList.add('hidden');this.nextElementSibling.classList.remove('hidden')">` : ''}
                <div class="${imgUrl ? 'hidden' : ''} text-3xl">${p.emoji}</div>
            </div>
            <div class="p-3">
                <p class="text-[9px] font-bold text-emerald-500 uppercase tracking-tighter mb-1">${t.cats[p.cat[1]||p.cat[0]]}</p>
                <h3 class="text-[12px] font-bold text-gray-800 leading-snug line-clamp-2 h-8 mb-1">${d.name}</h3>
                <p class="text-[10px] text-gray-400">${d.mfr}</p>
            </div>
        </div>
    `;
}

function render() {
    const t = T[state.lang];
    
    // Render Categories
    const catsContainer = document.getElementById('cats-container');
    catsContainer.innerHTML = t.cats.map((cat, i) => `
        <button onclick="setActiveCat(${i})" class="category-btn w-full px-2 py-3 rounded-xl text-[10px] font-bold transition-all text-gray-400 hover:bg-gray-100 ${state.activeCat === i ? 'active' : ''}">
            ${cat}
        </button>
    `).join('');

    // Filter Products
    const filtered = products.filter(p => {
        const matchesCat = state.activeCat === 0 || p.cat.includes(state.activeCat);
        const matchesSearch = p[state.lang].name.toLowerCase().includes(state.searchQuery) || 
                              p[state.lang].mfr.toLowerCase().includes(state.searchQuery) ||
                              p[state.lang].desc.toLowerCase().includes(state.searchQuery);
        return matchesCat && matchesSearch;
    });

    // Render Products
    const productsContainer = document.getElementById('products-container');
    const emptyState = document.getElementById('empty-state');
    
    if (filtered.length === 0) {
        productsContainer.innerHTML = '';
        emptyState.classList.remove('hidden');
    } else {
        emptyState.classList.add('hidden');
        productsContainer.innerHTML = filtered.map(p => getProductHTML(p, t)).join('');
    }
}

function openModal(p) {
    const d = p[state.lang];
    const t = T[state.lang];
    
    const mImgContainer = document.getElementById('m-img-container');
    const rot = p.rotate ? `style="transform:rotate(${p.rotate}deg)"` : '';
    const imgUrl = p.imgId ? `https://drive.google.com/thumbnail?id=${p.imgId}&sz=w400` : '';
    
    mImgContainer.innerHTML = imgUrl ? 
        `<img src="${imgUrl}" class="w-full h-full object-cover" ${rot} onerror="this.classList.add('hidden');this.nextElementSibling.classList.remove('hidden')"><div class="hidden text-6xl">${p.emoji}</div>` : 
        `<div class="text-6xl">${p.emoji}</div>`;

    document.getElementById('m-cat').textContent = t.cats[p.cat[1]||p.cat[0]];
    document.getElementById('m-name').textContent = d.name;
    document.getElementById('m-mfr').textContent = d.mfr;
    document.getElementById('m-label-ing').textContent = t.labelIng;
    document.getElementById('m-ing').textContent = d.ing;
    document.getElementById('m-label-desc').textContent = t.labelDesc;
    document.getElementById('m-desc').textContent = d.desc;
    document.getElementById('m-label-use').textContent = t.labelUse;
    document.getElementById('m-use').textContent = d.use;

    const backdrop = document.getElementById('modal-backdrop');
    const modal = document.getElementById('detail-modal');
    
    backdrop.classList.remove('hidden');
    setTimeout(() => {
        backdrop.classList.add('opacity-100');
        modal.classList.remove('translate-y-full');
    }, 10);
}

function closeModal(e) {
    if (e.target.id === 'modal-backdrop') closeModalBtn();
}

function closeModalBtn() {
    const backdrop = document.getElementById('modal-backdrop');
    const modal = document.getElementById('detail-modal');
    
    backdrop.classList.remove('opacity-100');
    modal.classList.add('translate-y-full');
    setTimeout(() => {
        backdrop.classList.add('hidden');
    }, 300);
}

document.addEventListener('DOMContentLoaded', () => {
    updateLanguageUI();
    render();
});
</script>
